devices:
  vkb_gladiator: /dev/input/event8    # VKB Gladiator EVO OT R (right stick)
  virpil_mt50cm3: /dev/input/event5   # Virpil L-VPC MT-50CM3 (left stick)

autofire:
  trigger_device: vkb_gladiator
  trigger_button: BTN_TRIGGER         # physical trigger — hold to run loop

  # Gauss Cannon timing
  charge_hold_ms: 1300                # hold time per shot (1.2s minimum + margin)
  inter_shot_ms: 150                  # gap between releasing and pressing next trigger
  fire_groups: 3                      # how many groups to cycle through

  # Elite Dangerous key binding for "Next Fire Group"
  # TODO: fill in after checking Windows ED bindings
  cycle_group_key: KEY_RIGHTBRACE     # placeholder — default ED binding is ]

voice:
  enabled: true
  ptt_enabled: true                   # false = always-on (voice activity detection)

  # TODO: set ptt_button after running identify_buttons.py
  ptt_device: vkb_gladiator
  ptt_button: BTN_THUMB               # placeholder

  model: base.en                      # faster-whisper model size
  compute_device: cuda                # uses RTX 5090

  commands:
    abort:
      phrases: ["stop", "abort", "cease fire", "kill"]
      action: stop_autofire

    # Add more ED voice commands here
    # hardpoints:
    #   phrases: ["deploy hardpoints", "weapons out"]
    #   action: keypress
    #   key: KEY_U
